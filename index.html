<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top News — Dashboard</title>
  <style>
    :root {
      --cream:   #FBF5E8;
      --cobalt:  #1E4FD9;
      --sun:     #F5C518;
      --tomato:  #E63946;
      --pink:    #E94B9B;
      --jade:    #0E8C7A;
      --purple:  #7C3AED;
      --text:    #1C1C1C;
      --muted:   #8A8A8A;
      --border:  #E5DDD0;
      --white:   #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--cream);
      color: var(--text);
      padding: 22px 24px 36px;
      min-height: 100vh;
    }

    /* ── Sticky tab bar ── */
    .tabs-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--cream);
      padding: 14px 0 14px;
      margin: 0 -24px 22px;
      padding-left: 24px;
      padding-right: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .tabs-bar.scrolled {
      border-bottom-color: var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex: 1;
    }

    .btn-refresh {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-refresh:hover { border-color: var(--cobalt); color: var(--cobalt); }
    .tab {
      padding: 5px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: 0.15s;
      user-select: none;
    }
    .tab:hover:not(.active) { border-color: var(--cobalt); color: var(--cobalt); }

    .tab.active[data-cat="All"]      { background: var(--cobalt);  border-color: var(--cobalt);  color: #fff; }
    .tab.active[data-cat="Business"] { background: var(--jade);    border-color: var(--jade);    color: #fff; }
    .tab.active[data-cat="Product"]  { background: var(--pink);    border-color: var(--pink);    color: #fff; }
    .tab.active[data-cat="Tech"]     { background: var(--cobalt);  border-color: var(--cobalt);  color: #fff; }
    .tab.active[data-cat="Design"]   { background: var(--tomato);  border-color: var(--tomato);  color: #fff; }
    .tab.active[data-cat="Finance"]  { background: var(--purple);  border-color: var(--purple);  color: #fff; }
    .tab.active[data-cat="Religion"] { background: var(--sun);     border-color: var(--sun);     color: var(--text); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    @media (max-width: 820px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }

    /* ── Card ── */
    .card {
      background: var(--white);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(30,79,217,0.09);
    }

    .card-img {
      width: 100%;
      height: 148px;
      object-fit: cover;
      display: block;
    }
    .card-placeholder {
      width: 100%;
      height: 148px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      background: linear-gradient(135deg, #f0eadd 0%, #e8dfd3 100%);
    }

    .card-body {
      padding: 13px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      flex: 1;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
    }
    .card-source {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card-sep { color: var(--border); }
    .card-time { color: var(--muted); }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.45;
    }
    .card-desc {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }
    .card-cta {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    /* ── States ── */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 240px;
      gap: 14px;
      text-align: center;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--cobalt);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-text { font-size: 14px; color: var(--muted); }

    .error-box {
      background: #fff8f8;
      border: 1px solid #ffd5d5;
      border-radius: 12px;
      padding: 24px;
      font-size: 14px;
      color: var(--tomato);
      text-align: center;
      line-height: 1.7;
    }
    .error-box a { color: var(--cobalt); }
    .error-box code {
      background: #f0eadd;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 20px;
      font-size: 11.5px;
      color: var(--muted);
      text-align: right;
    }
  </style>
</head>
<body>

<div class="tabs-bar" id="tabsBar">
  <div class="tabs" id="tabs"></div>
  <button class="btn-refresh" onclick="load(active, true)">↻ Refresh</button>
</div>
<div id="content"></div>
<div class="footer" id="footer"></div>

<script>
  // No API key needed — uses public RSS feeds via rss2json.com

  const FEEDS = {
    All:      'https://feeds.bbci.co.uk/news/rss.xml',
    Business: 'https://feeds.bbci.co.uk/news/business/rss.xml',
    Product:  'https://techcrunch.com/feed/',
    Tech:     'https://www.theverge.com/rss/index.xml',
    Design:   'https://uxdesign.cc/feed',
    Finance:  [
      'https://www.cnbc.com/id/10000664/device/rss/rss.html',
      'https://rss.detik.com/index.php/detikfinance',
    ],
    Religion: 'https://aboutislam.net/feed/',
  };

  const ICONS = {
    All: '🌍', Business: '💼', Product: '📦',
    Tech: '💻', Design: '🎨', Finance: '💰', Religion: '✨',
  };

  const CATEGORIES = Object.keys(FEEDS);
  let active = 'All';
  const cache = {};

  /* Build tabs */
  const tabsEl = document.getElementById('tabs');
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === 'All' ? ' active' : '');
    btn.dataset.cat = cat;
    btn.textContent = ICONS[cat] + ' ' + cat;
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      active = cat;
      load(cat);
    };
    tabsEl.appendChild(btn);
  });

  /* Fetch or serve from cache */
  async function load(cat, force = false) {
    if (!force && cache[cat]) { render(cache[cat], cat); return; }

    showLoading();
    const urls = Array.isArray(FEEDS[cat]) ? FEEDS[cat] : [FEEDS[cat]];

    try {
      const responses = await Promise.all(
        urls.map(u =>
          fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(u)}&count=12`)
            .then(r => r.json())
        )
      );

      let merged = [];
      responses.forEach(data => {
        if (data.status !== 'ok') return;
        const feedName = data.feed?.title || cat;
        data.items.forEach(item => {
          merged.push({
            title:       item.title,
            url:         item.link,
            description: stripHtml(item.description),
            image:       pickImage(item),
            source:      feedName,
            publishedAt: item.pubDate,
          });
        });
      });

      if (!merged.length) throw new Error('No articles returned');
      merged.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
      cache[cat] = merged.slice(0, 12);
      render(cache[cat], cat);
    } catch (err) {
      showError('Could not load news: ' + err.message);
    }
  }

  function pickImage(item) {
    if (item.thumbnail && item.thumbnail !== 'false' && item.thumbnail !== '') return item.thumbnail;
    if (item.enclosure?.link && item.enclosure.type?.startsWith('image')) return item.enclosure.link;
    const m = (item.description || '').match(/<img[^>]+src=["']([^"']+)["']/i);
    return m ? m[1] : null;
  }

  function stripHtml(html) {
    const d = document.createElement('div');
    d.innerHTML = html || '';
    return d.textContent.trim();
  }

  /* Render article cards */
  function render(articles, cat) {
    const el = document.getElementById('content');
    document.getElementById('footer').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

    if (!articles.length) {
      el.innerHTML = '<div class="error-box">No articles found. Try refreshing.</div>';
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'grid';

    articles.forEach(a => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = a.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';

      const imgHtml = a.image
        ? `<img class="card-img" src="${x(a.image)}" alt="" loading="lazy"
               onerror="this.outerHTML='<div class=card-placeholder>${ICONS[cat]}</div>'">`
        : `<div class="card-placeholder">${ICONS[cat]}</div>`;

      card.innerHTML = `
        ${imgHtml}
        <div class="card-body">
          <div class="card-meta">
            <span class="card-source">${x(a.source)}</span>
            <span class="card-sep">·</span>
            <span class="card-time">${ago(a.publishedAt)}</span>
          </div>
          <div class="card-title">${x(a.title)}</div>
          <div class="card-desc">${x(a.description)}</div>
          <div class="card-cta">Read more →</div>
        </div>`;

      grid.appendChild(card);
    });

    el.innerHTML = '';
    el.appendChild(grid);
  }

  function showLoading() {
    document.getElementById('content').innerHTML =
      `<div class="state"><div class="spinner"></div><div class="state-text">Fetching latest news…</div></div>`;
  }
  function showError(msg) {
    document.getElementById('content').innerHTML = `<div class="error-box">${msg}</div>`;
  }

  function x(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function ago(iso) {
    const h = Math.floor((Date.now() - new Date(iso)) / 3_600_000);
    if (h < 1) return 'Just now';
    if (h < 24) return h + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }

  /* Sticky shadow on scroll */
  const bar = document.getElementById('tabsBar');
  window.addEventListener('scroll', () => {
    bar.classList.toggle('scrolled', window.scrollY > 10);
  }, { passive: true });

  load('All');
</script>
</body>
</html>
